server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend container by its
    # docker-compose service name. Because the browser only ever talks
    # to this Nginx origin, the /api call is same-origin from the
    # browser's point of view - the backend's CORS allow-list
    # (localhost:4200) is irrelevant to this path and only matters if
    # you hit the backend directly (e.g. during `ng serve` local dev).
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Angular client-side routing: any path that isn't a real static
    # file falls back to index.html so deep links (e.g. /analytics)
    # work on a hard refresh instead of 404ing at Nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reasonable caching for hashed build assets; index.html itself is
    # excluded by the location block above always trying it fresh via
    # try_files, so a new deploy is picked up on next navigation.
    location ~* \.(?:js|css|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
